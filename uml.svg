<svg width="680" height="720" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="hollow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9Z" fill="white" stroke="#555" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="720" fill="white"/>

  <!-- ── Operation (abstract) ── -->
  <rect x="230" y="20" width="220" height="90" rx="8" fill="#EDE9FC" stroke="#7C6FCD" stroke-width="1"/>
  <line x1="230" y1="46" x2="450" y2="46" stroke="#7C6FCD" stroke-width="0.8"/>
  <line x1="230" y1="66" x2="450" y2="66" stroke="#7C6FCD" stroke-width="0.8"/>
  <text x="340" y="36" text-anchor="middle" font-size="11" fill="#4B3FA0" font-style="italic">«abstract»</text>
  <text x="340" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#3B2E8C">Operation</text>
  <text x="340" y="78" text-anchor="middle" font-size="11" fill="#4B3FA0">+ execute(a, b) : double</text>
  <text x="340" y="96" text-anchor="middle" font-size="11" fill="#4B3FA0">+ execute(a) : double</text>

  <!-- Inheritance: vertical from Operation -->
  <line x1="340" y1="110" x2="340" y2="145" stroke="#888" stroke-width="1"/>
  <!-- Horizontal bus -->
  <line x1="55" y1="145" x2="625" y2="145" stroke="#888" stroke-width="1"/>
  <!-- Drop lines -->
  <line x1="55"  y1="145" x2="55"  y2="185" stroke="#888" stroke-width="1"/>
  <line x1="165" y1="145" x2="165" y2="185" stroke="#888" stroke-width="1"/>
  <line x1="275" y1="145" x2="275" y2="185" stroke="#888" stroke-width="1"/>
  <line x1="385" y1="145" x2="385" y2="185" stroke="#888" stroke-width="1"/>
  <line x1="495" y1="145" x2="495" y2="185" stroke="#888" stroke-width="1"/>
  <line x1="625" y1="145" x2="625" y2="185" stroke="#888" stroke-width="1"/>
  <!-- Hollow triangle at top of bus -->
  <polygon points="340,111 334,124 346,124" fill="white" stroke="#888" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- ── Add ── -->
  <rect x="15" y="185" width="80" height="76" rx="8" fill="#E0F7F1" stroke="#1A8C6B" stroke-width="1"/>
  <line x1="15" y1="208" x2="95" y2="208" stroke="#1A8C6B" stroke-width="0.8"/>
  <line x1="15" y1="224" x2="95" y2="224" stroke="#1A8C6B" stroke-width="0.8"/>
  <text x="55" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#0D6B52">Add</text>
  <text x="55" y="218" text-anchor="middle" font-size="10" fill="#1A8C6B">—</text>
  <text x="55" y="236" text-anchor="middle" font-size="10" fill="#1A8C6B">execute(a,b)</text>
  <text x="55" y="252" text-anchor="middle" font-size="10" fill="#1A8C6B">→ a + b</text>

  <!-- ── Subtract ── -->
  <rect x="125" y="185" width="80" height="76" rx="8" fill="#E0F7F1" stroke="#1A8C6B" stroke-width="1"/>
  <line x1="125" y1="208" x2="205" y2="208" stroke="#1A8C6B" stroke-width="0.8"/>
  <line x1="125" y1="224" x2="205" y2="224" stroke="#1A8C6B" stroke-width="0.8"/>
  <text x="165" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#0D6B52">Subtract</text>
  <text x="165" y="218" text-anchor="middle" font-size="10" fill="#1A8C6B">—</text>
  <text x="165" y="236" text-anchor="middle" font-size="10" fill="#1A8C6B">execute(a,b)</text>
  <text x="165" y="252" text-anchor="middle" font-size="10" fill="#1A8C6B">→ a − b</text>

  <!-- ── Multiply ── -->
  <rect x="235" y="185" width="80" height="76" rx="8" fill="#E0F7F1" stroke="#1A8C6B" stroke-width="1"/>
  <line x1="235" y1="208" x2="315" y2="208" stroke="#1A8C6B" stroke-width="0.8"/>
  <line x1="235" y1="224" x2="315" y2="224" stroke="#1A8C6B" stroke-width="0.8"/>
  <text x="275" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#0D6B52">Multiply</text>
  <text x="275" y="218" text-anchor="middle" font-size="10" fill="#1A8C6B">—</text>
  <text x="275" y="236" text-anchor="middle" font-size="10" fill="#1A8C6B">execute(a,b)</text>
  <text x="275" y="252" text-anchor="middle" font-size="10" fill="#1A8C6B">→ a × b</text>

  <!-- ── Divide ── -->
  <rect x="345" y="185" width="80" height="76" rx="8" fill="#E0F7F1" stroke="#1A8C6B" stroke-width="1"/>
  <line x1="345" y1="208" x2="425" y2="208" stroke="#1A8C6B" stroke-width="0.8"/>
  <line x1="345" y1="224" x2="425" y2="224" stroke="#1A8C6B" stroke-width="0.8"/>
  <text x="385" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#0D6B52">Divide</text>
  <text x="385" y="218" text-anchor="middle" font-size="10" fill="#1A8C6B">—</text>
  <text x="385" y="236" text-anchor="middle" font-size="10" fill="#1A8C6B">execute(a,b)</text>
  <text x="385" y="252" text-anchor="middle" font-size="10" fill="#1A8C6B">→ a ÷ b</text>

  <!-- ── Square ── -->
  <rect x="455" y="185" width="80" height="76" rx="8" fill="#FDEEE8" stroke="#B84820" stroke-width="1"/>
  <line x1="455" y1="208" x2="535" y2="208" stroke="#B84820" stroke-width="0.8"/>
  <line x1="455" y1="224" x2="535" y2="224" stroke="#B84820" stroke-width="0.8"/>
  <text x="495" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#8C3010">Square</text>
  <text x="495" y="218" text-anchor="middle" font-size="10" fill="#B84820">—</text>
  <text x="495" y="236" text-anchor="middle" font-size="10" fill="#B84820">execute(a)</text>
  <text x="495" y="252" text-anchor="middle" font-size="10" fill="#B84820">→ a²</text>

  <!-- ── SquareRoot ── -->
  <rect x="575" y="185" width="82" height="76" rx="8" fill="#FDEEE8" stroke="#B84820" stroke-width="1"/>
  <line x1="575" y1="208" x2="657" y2="208" stroke="#B84820" stroke-width="0.8"/>
  <line x1="575" y1="224" x2="657" y2="224" stroke="#B84820" stroke-width="0.8"/>
  <text x="616" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#8C3010">SquareRoot</text>
  <text x="616" y="218" text-anchor="middle" font-size="10" fill="#B84820">—</text>
  <text x="616" y="236" text-anchor="middle" font-size="10" fill="#B84820">execute(a)</text>
  <text x="616" y="252" text-anchor="middle" font-size="10" fill="#B84820">→ √a</text>

  <!-- ── Calculator ── -->
  <rect x="210" y="380" width="260" height="106" rx="8" fill="#E6F2FD" stroke="#1A5FA8" stroke-width="1"/>
  <line x1="210" y1="404" x2="470" y2="404" stroke="#1A5FA8" stroke-width="0.8"/>
  <line x1="210" y1="426" x2="470" y2="426" stroke="#1A5FA8" stroke-width="0.8"/>
  <text x="340" y="396" text-anchor="middle" font-size="13" font-weight="bold" fill="#0C3D7A">Calculator</text>
  <text x="340" y="416" text-anchor="middle" font-size="11" fill="#1A5FA8">− currentValue : double</text>
  <text x="340" y="444" text-anchor="middle" font-size="11" fill="#1A5FA8">+ run(op : Operation) : void</text>
  <text x="340" y="460" text-anchor="middle" font-size="11" fill="#1A5FA8">+ clear() : void</text>
  <text x="340" y="476" text-anchor="middle" font-size="11" fill="#1A5FA8">+ getResult() : double</text>

  <!-- Calculator ..> Operation (dashed, uses) -->
  <path d="M340 380 L340 262" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#hollow)"/>
  <text x="356" y="320" font-size="10" fill="#666">uses</text>

  <!-- ── Result ── -->
  <rect x="210" y="560" width="260" height="110" rx="8" fill="#FFF5E0" stroke="#A06010" stroke-width="1"/>
  <line x1="210" y1="584" x2="470" y2="584" stroke="#A06010" stroke-width="0.8"/>
  <line x1="210" y1="606" x2="470" y2="606" stroke="#A06010" stroke-width="0.8"/>
  <text x="340" y="576" text-anchor="middle" font-size="13" font-weight="bold" fill="#7A4800">Result</text>
  <text x="340" y="596" text-anchor="middle" font-size="11" fill="#A06010">+ value : double</text>
  <text x="340" y="618" text-anchor="middle" font-size="11" fill="#A06010">+ history : List&lt;double&gt;</text>
  <text x="340" y="638" text-anchor="middle" font-size="11" fill="#A06010">+ display() : void</text>
  <text x="340" y="655" text-anchor="middle" font-size="11" fill="#A06010">+ save() : void</text>

  <!-- Calculator --> Result -->
  <line x1="340" y1="486" x2="340" y2="558" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="10" y="320" width="160" height="58" rx="6" fill="#F8F8F8" stroke="#CCC" stroke-width="0.8"/>
  <line x1="20" y1="337" x2="46" y2="337" stroke="#888" stroke-width="1" stroke-dasharray="5 4"/>
  <polygon points="43,333 50,337 43,341" fill="white" stroke="#888" stroke-width="1.2" stroke-linejoin="round"/>
  <text x="54" y="341" font-size="10" fill="#555">依賴 / 使用</text>
  <line x1="20" y1="355" x2="48" y2="355" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="54" y="359" font-size="10" fill="#555">關聯 / 擁有</text>
  <line x1="20" y1="372" x2="46" y2="372" stroke="#888" stroke-width="1"/>
  <polygon points="43,368 50,372 43,376" fill="white" stroke="#888" stroke-width="1.2" stroke-linejoin="round"/>
  <text x="54" y="376" font-size="10" fill="#555">繼承</text>
</svg>